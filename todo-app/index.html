<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List Application</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px 30px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      color: #333;
      font-size: 32px;
      margin-bottom: 10px;
    }

    header p {
      color: #999;
      font-size: 14px;
    }

    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    #todoInput {
      flex: 1;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    #todoInput:focus {
      outline: none;
      border-color: #667eea;
    }

    #addBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #addBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    #addBtn:active {
      transform: translateY(0);
    }

    .filter-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      justify-content: center;
    }

    .filter-btn {
      padding: 8px 15px;
      border: 2px solid #eee;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
    }

    .filter-btn:hover {
      border-color: #667eea;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid #eee;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }

    #todoList {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    #todoList li {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
    }

    #todoList li:hover {
      background: #f0f1f5;
      transform: translateX(5px);
    }

    #todoList li.completed {
      opacity: 0.6;
    }

    #todoList li.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      color: #333;
      font-size: 14px;
      word-break: break-word;
    }

    .priority-badge {
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .priority-badge.high {
      background: #ffe5e5;
      color: #d32f2f;
    }

    .priority-badge.medium {
      background: #fff3e0;
      color: #f57c00;
    }

    .priority-badge.low {
      background: #e8f5e9;
      color: #388e3c;
    }

    .delete-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .delete-btn:hover {
      background: #ff5252;
      transform: scale(1.05);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .empty-state p {
      font-size: 14px;
    }

    .clear-all-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .clear-all-btn:hover {
      background: #ff5252;
    }

    .priority-select {
      padding: 8px 12px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: white;
      color: #666;
    }

    #todoList::-webkit-scrollbar {
      width: 6px;
    }

    #todoList::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    #todoList::-webkit-scrollbar-thumb {
      background: #667eea;
      border-radius: 10px;
    }

    #todoList::-webkit-scrollbar-thumb:hover {
      background: #764ba2;
    }

    @media (max-width: 480px) {
      .container {
        padding: 25px 20px;
      }

      header h1 {
        font-size: 24px;
      }

      .input-container {
        flex-direction: column;
      }

      .filter-buttons {
        flex-wrap: wrap;
      }

      .stats {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>📝 My To-Do List</h1>
      <p>Stay organized and track your tasks</p>
    </header>

    <div class="input-container">
      <input 
        type="text" 
        id="todoInput" 
        placeholder="Add a new task..."
        autocomplete="off"
      />
      <select id="prioritySelect" class="priority-select">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button id="addBtn">Add</button>
    </div>

    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-number" id="totalCount">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="activeCount">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat">
        <div class="stat-number" id="completedCount">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <ul id="todoList"></ul>

    <button class="clear-all-btn" id="clearAllBtn">Clear Completed</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
